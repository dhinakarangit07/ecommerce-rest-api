<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ecommerce Website</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

    <!-- Navbar -->
    <nav class="navbar navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="#">
                Ecommerce Website
            </a>
        </div>
    </nav>

    <!-- Hero Section -->
    <div class="container text-center mt-5">

        <h1 class="display-4 fw-bold">
            Welcome to Ecommerce Website
        </h1>

        <p class="lead mt-3">
            Products, Cart, Orders 
        </p>

        <div class="mt-4">
            <a href="/admin/" class="btn btn-primary btn-lg">
                Admin Panel
            </a>
        </div>

    </div>

    <!-- API Section -->
    <div class="container mt-5">

        <h2 class="mb-4">Available </h2>

        <div class="list-group">

            <a href="/api/products/" class="list-group-item list-group-item-action">
                Products 
            </a>

            <a href="/api/cart/" class="list-group-item list-group-item-action">
                Cart 
            </a>

            <a href="/api/orders/history/" class="list-group-item list-group-item-action">
                Orders
            </a>

            <a href="/api/users/" class="list-group-item list-group-item-action">
                Users 
            </a>

        </div>
    </div>

</body>
</html>
