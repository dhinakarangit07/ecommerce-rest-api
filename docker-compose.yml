services:
  db:
    image: mysql:8
    environment:
      MYSQL_DATABASE: ecommerce_db
      MYSQL_ROOT_PASSWORD: root123
    ports:
      - "3307:3306"

  web:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      - db

command: sh -c "sleep 10 && python manage.py migrate && python manage.py runserver 0.0.0.0:8000"